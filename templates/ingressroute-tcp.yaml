{{- if eq .Values.ingress.type "traefik" }}
# --- Coordinator ---
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: {{ include "any-sync.fullname" . }}-coordinator
  labels:
    {{- include "any-sync.labels" . | nindent 4 }}
spec:
  entryPoints:
    - any-sync-coordinator
  routes:
    - match: HostSNI(`*`)
      services:
        - name: any-sync-coordinator
          port: {{ .Values.coordinator.port }}
---
