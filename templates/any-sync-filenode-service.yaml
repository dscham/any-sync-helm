apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: any-sync-filenode
    app.kubernetes.io/instance: '{{ .Release.Name }}'
    app.kubernetes.io/managed-by: '{{ .Release.Service }}'
  name: any-sync-filenode
spec:
  ports:
  - name: '{{ .Values.filenode.port }}'
    port: '{{ .Values.filenode.port }}'
    targetPort: '{{ .Values.filenode.port }}'
  - name: '1015'
    port: 1015
    protocol: UDP
    targetPort: 1015
  - name: '8005'
    port: 8005
    targetPort: 8000
  selector:
    io.kompose.service: any-sync-filenode
