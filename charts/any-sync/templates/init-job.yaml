{{/*
Init Job — generates cryptographic keys and node configuration.
Uses the published any-sync-tools image with scripts mounted as ConfigMaps.
No custom image build required.
*/}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "any-sync.fullname" . }}-init
  labels:
    {{- include "any-sync.labels" . | nindent 4 }}
    app.kubernetes.io/name: any-sync-init
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: any-sync-init
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "any-sync.fullname" . }}-init
      initContainers:
        - name: init
          image: {{ .Values.init.image.repository }}:{{ .Values.init.image.tag }}
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "INFO: Installing runtime dependencies..."
              export DEBIAN_FRONTEND=noninteractive
              apt-get update -qq
              apt-get install -y -qq --no-install-recommends \
                bash curl ca-certificates perl python3 python3-yaml python-is-python3 > /dev/null 2>&1
              ARCH=$(dpkg --print-architecture)
              curl -sL "https://github.com/mikefarah/yq/releases/latest/download/yq_linux_${ARCH}" \
                -o /usr/local/bin/yq
              chmod +x /usr/local/bin/yq
              curl -sL "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/${ARCH}/kubectl" \
                -o /usr/local/bin/kubectl
              chmod +x /usr/local/bin/kubectl
              echo "INFO: Dependencies installed."

              if kubectl get secret {{ include "any-sync.fullname" . }}-network-configs >/dev/null 2>&1; then
                echo "INFO: Network configs already exist in Secret. Skipping generation to avoid overwriting!"
                exit 0
              fi

              # Copy scripts from ConfigMap to working directory
              mkdir -p /code/docker-generateconfig
              cp /scripts/init.sh /code/docker-generateconfig/init.sh
              cp /scripts/setListenIp.py /code/docker-generateconfig/setListenIp.py
              chmod +x /code/docker-generateconfig/init.sh

              # Copy config templates
              mkdir -p /code/docker-generateconfig/etc
              for f in common.yml coordinator.yml filenode.yml consensusnode.yml node-1.yml node-2.yml node-3.yml aws-credentials; do
                cp "/config-templates/$f" "/code/docker-generateconfig/etc/$f"
              done

              echo "INFO: Running init.sh..."
              cd /code
              bash /code/docker-generateconfig/init.sh

              echo "INFO: Patching external addresses with NodePort numbers..."
              HOSTNAME="{{ .Values.externalHostname }}"
              if [ -n "$HOSTNAME" ] && [ -f /code/etc/client.yml ]; then
                # Map internal ports to NodePorts for external addresses
                {{- range $svc := list "syncNode1" "syncNode2" "syncNode3" "coordinator" "filenode" "consensusnode" }}
                INT_PORT={{ index $.Values $svc "port" }}
                NODE_PORT={{ index $.Values $svc "nodePort" }}
                QUIC_INT={{ index $.Values $svc "quicPort" }}
                QUIC_NODE={{ index $.Values $svc "quicNodePort" }}
                # Replace externalHostname:internalPort with externalHostname:nodePort
                sed -i "s|${HOSTNAME}:${INT_PORT}|${HOSTNAME}:${NODE_PORT}|g" /code/etc/client.yml
                sed -i "s|${HOSTNAME}:${QUIC_INT}|${HOSTNAME}:${QUIC_NODE}|g" /code/etc/client.yml
                {{- end }}
                echo "INFO: External addresses patched."
              fi
          volumeMounts:
            - name: env-file
              mountPath: /code/.env
              subPath: .env
              readOnly: true
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: config-templates
              mountPath: /config-templates
              readOnly: true
            - name: storage
              mountPath: /code/storage/docker-generateconfig
            - name: etc-output
              mountPath: /code/etc
      containers:
        - name: create-secret
          image: {{ .Values.exportClientConfig.image.repository }}:{{ .Values.exportClientConfig.image.tag }}
          command:
            - /bin/sh
            - -c
            - |
              if kubectl get secret {{ include "any-sync.fullname" . }}-network-configs >/dev/null 2>&1; then
                echo "INFO: Network configs already exist in Secret. Skipping secret creation."
                exit 0
              fi

              echo "INFO: Storing generated configuration into Secret..."
              
              # Flatten the configs for easier secret projection
              cp /code/etc/any-sync-node-1/config.yml /code/etc/node-1.yml
              cp /code/etc/any-sync-node-2/config.yml /code/etc/node-2.yml
              cp /code/etc/any-sync-node-3/config.yml /code/etc/node-3.yml
              cp /code/etc/any-sync-coordinator/config.yml /code/etc/coordinator.yml
              cp /code/etc/any-sync-coordinator/network.yml /code/etc/network.yml
              cp /code/etc/any-sync-filenode/config.yml /code/etc/filenode.yml
              cp /code/etc/any-sync-consensusnode/config.yml /code/etc/consensusnode.yml
              
              kubectl create secret generic {{ include "any-sync.fullname" . }}-network-configs \
                --from-file=client.yml=/code/etc/client.yml \
                --from-file=node-1.yml=/code/etc/node-1.yml \
                --from-file=node-2.yml=/code/etc/node-2.yml \
                --from-file=node-3.yml=/code/etc/node-3.yml \
                --from-file=coordinator.yml=/code/etc/coordinator.yml \
                --from-file=network.yml=/code/etc/network.yml \
                --from-file=filenode.yml=/code/etc/filenode.yml \
                --from-file=consensusnode.yml=/code/etc/consensusnode.yml \
                --from-file=aws-credentials=/code/etc/.aws/credentials \
                --dry-run=client -o yaml | kubectl apply -f -
                
              echo "INFO: Secret {{ include "any-sync.fullname" . }}-network-configs successfully created."
          volumeMounts:
            - name: storage
              mountPath: /code/storage/docker-generateconfig
            - name: etc-output
              mountPath: /code/etc
      volumes:
        - name: env-file
          configMap:
            name: any-sync-init-cm0
        - name: scripts
          configMap:
            name: {{ include "any-sync.fullname" . }}-init-scripts
        - name: config-templates
          configMap:
            name: {{ include "any-sync.fullname" . }}-init-config-templates
        - name: storage
          emptyDir: {}
        - name: etc-output
          emptyDir: {}
