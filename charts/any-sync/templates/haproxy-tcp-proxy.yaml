{{/*
HAProxy Ingress Controller TCP/UDP proxy configuration.

HAProxy Ingress uses a ConfigMap with tcp-services-configmap key to define
TCP service proxying. The controller must be configured to reference this
ConfigMap — see haproxy-values-snippet.yaml for the required Helm values.

Note: HAProxy Ingress has limited UDP support. QUIC ports are exposed
via additional ConfigMap entries when the controller version supports it.
*/}}
{{- if eq .Values.ingress.type "haproxy" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "any-sync.fullname" . }}-haproxy-tcp-services
  labels:
    {{- include "any-sync.labels" . | nindent 4 }}
data:
  # Format: "<port>": "<namespace>/<service>:<service-port>"
  # TCP services (DRPC/yamux)
  "{{ .Values.coordinator.port }}": "{{ .Release.Namespace }}/any-sync-coordinator:{{ .Values.coordinator.port }}"
  "{{ .Values.filenode.port }}": "{{ .Release.Namespace }}/any-sync-filenode:{{ .Values.filenode.port }}"
  "{{ .Values.consensusnode.port }}": "{{ .Release.Namespace }}/any-sync-consensusnode:{{ .Values.consensusnode.port }}"
  "{{ .Values.syncNode1.port }}": "{{ .Release.Namespace }}/any-sync-node-1:{{ .Values.syncNode1.port }}"
  "{{ .Values.syncNode2.port }}": "{{ .Release.Namespace }}/any-sync-node-2:{{ .Values.syncNode2.port }}"
  "{{ .Values.syncNode3.port }}": "{{ .Release.Namespace }}/any-sync-node-3:{{ .Values.syncNode3.port }}"
  # QUIC ports (UDP — requires HAProxy >= 2.6 with QUIC support)
  "{{ .Values.coordinator.quicPort }}": "{{ .Release.Namespace }}/any-sync-coordinator:{{ .Values.coordinator.quicPort }}::PROXY"
  "{{ .Values.filenode.quicPort }}": "{{ .Release.Namespace }}/any-sync-filenode:{{ .Values.filenode.quicPort }}::PROXY"
  "{{ .Values.consensusnode.quicPort }}": "{{ .Release.Namespace }}/any-sync-consensusnode:{{ .Values.consensusnode.quicPort }}::PROXY"
  "{{ .Values.syncNode1.quicPort }}": "{{ .Release.Namespace }}/any-sync-node-1:{{ .Values.syncNode1.quicPort }}::PROXY"
  "{{ .Values.syncNode2.quicPort }}": "{{ .Release.Namespace }}/any-sync-node-2:{{ .Values.syncNode2.quicPort }}::PROXY"
  "{{ .Values.syncNode3.quicPort }}": "{{ .Release.Namespace }}/any-sync-node-3:{{ .Values.syncNode3.quicPort }}::PROXY"
{{- end }}
