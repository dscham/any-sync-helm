apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: any-sync-node-1
    app.kubernetes.io/instance: '{{ .Release.Name }}'
    app.kubernetes.io/managed-by: '{{ .Release.Service }}'
  name: any-sync-node-1
spec:
  ports:
  - name: syncNode1-tcp
    port: '{{ .Values.syncNode1.port }}'
    targetPort: '{{ .Values.syncNode1.port }}'
    nodePort: '{{ .Values.syncNode1.nodePort }}'
  - name: syncNode1-quic
    port: '{{ .Values.syncNode1.quicPort }}'
    protocol: UDP
    targetPort: '{{ .Values.syncNode1.quicPort }}'
    nodePort: '{{ .Values.syncNode1.quicNodePort }}'
  - name: '8081'
    port: 8081
    targetPort: 8080
  - name: '8001'
    port: 8001
    targetPort: 8000
  selector:
    io.kompose.service: any-sync-node-1
  type: NodePort
