apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/instance: '{{ .Release.Name }}'
    app.kubernetes.io/managed-by: '{{ .Release.Service }}'
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
      app.kubernetes.io/instance: '{{ .Release.Name }}'
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/instance: '{{ .Release.Name }}'
        app.kubernetes.io/managed-by: '{{ .Release.Service }}'
    spec:
      containers:
      - args:
        - redis-server
        - --port
        - '{{ .Values.redis.port }}'
        - --dir
        - /data/
        - --appendonly
        - 'yes'
        - --maxmemory
        - 256mb
        - --maxmemory-policy
        - noeviction
        - --protected-mode
        - 'no'
        - --loadmodule
        - /opt/redis-stack/lib/redisbloom.so
        image: '{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}'
        livenessProbe:
          exec:
            command:
            - redis-cli
            - --raw
            - -p
            - '6379'
            - incr
            - ping
          failureThreshold: 3
          periodSeconds: 10
          timeoutSeconds: 30
        name: redis
        ports:
        - containerPort: {{ .Values.redis.port }}
          protocol: TCP
        volumeMounts:
        - mountPath: /data
          name: redis-claim0
      restartPolicy: Always
  serviceName: redis
  volumeClaimTemplates:
  - metadata:
      name: redis-claim0
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: '{{ .Values.redis.persistence.size }}'
