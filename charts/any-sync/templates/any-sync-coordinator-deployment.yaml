apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: any-sync-coordinator
    app.kubernetes.io/instance: '{{ .Release.Name }}'
    app.kubernetes.io/managed-by: '{{ .Release.Service }}'
  name: any-sync-coordinator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: any-sync-coordinator
      app.kubernetes.io/instance: '{{ .Release.Name }}'
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: any-sync-coordinator
        app.kubernetes.io/instance: '{{ .Release.Name }}'
        app.kubernetes.io/managed-by: '{{ .Release.Service }}'
    spec:
      containers:
      - image: '{{ .Values.coordinator.image.repository }}:{{ .Values.coordinator.image.tag }}'
        name: any-sync-coordinator
        ports:
        - containerPort: 1004
          protocol: TCP
        - containerPort: 1014
          protocol: UDP
        - containerPort: 8000
          protocol: TCP
        resources:
          limits:
            memory: '{{ .Values.coordinator.resources.limits.memory }}'
        volumeMounts:
        - mountPath: /etc/any-sync-coordinator
          name: any-sync-coordinator-claim0
        - mountPath: /networkStore
          name: any-sync-coordinator-claim1
      restartPolicy: Always
      volumes:
      - name: any-sync-coordinator-claim0
        persistentVolumeClaim:
          claimName: any-sync-coordinator-claim0
      - name: any-sync-coordinator-claim1
        persistentVolumeClaim:
          claimName: any-sync-coordinator-claim1
