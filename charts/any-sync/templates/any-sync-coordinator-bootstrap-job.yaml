apiVersion: batch/v1
kind: Job
metadata:
  name: any-sync-coordinator-bootstrap
  labels: &id001
    app.kubernetes.io/name: any-sync-coordinator-bootstrap
    app.kubernetes.io/instance: '{{ .Release.Name }}'
    app.kubernetes.io/managed-by: '{{ .Release.Service }}'
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: '1'
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 1
  template:
    metadata:
      labels: *id001
    spec:
      containers:
      - args:
        - /bin/any-sync-confapply
        - -c
        - /etc/any-sync-coordinator/config.yml
        - -n
        - /etc/any-sync-coordinator/network.yml
        - -e
        image: '{{ .Values.coordinatorBootstrap.image.repository }}:{{ .Values.coordinatorBootstrap.image.tag }}'
        name: any-sync-coordinator-bootstrap
        volumeMounts:
        - mountPath: /etc/any-sync-coordinator/config.yml
          name: network-configs
          subPath: coordinator.yml
        - name: network-configs
          mountPath: /etc/any-sync-coordinator/network.yml
          subPath: network.yml
      restartPolicy: OnFailure
      volumes:
      - name: network-configs
        secret:
          secretName: '{{ include "any-sync.fullname" . }}-network-configs'
